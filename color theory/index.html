<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color theory</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>Color theory</h1>
    <div id="parent">
        <div class="color">
            <h4>colorname</h4>
            <div class="round" id="colorname"></div>
        </div>
        <div class="color">
            <h4>hexa</h4>
            <div class="round" id="hexa"></div>
        </div>
        <div class="color">
            <h4>rgb</h4>
            <div class="round" id="rgb"></div>
        </div>
        <div class="color">
            <h4>rgba</h4>
            <div class="round" id="rgba"></div>
        </div>
        <div class="color">
            <h4>hsl</h4>
            <div class="round" id="hsl"></div>
        </div>
        <div class="color">
            <h4>hsla</h4>
            <div class="round" id="hsla"></div>
        </div>
        <div class="color">
            <h4>linear-gradient</h4>
            <div class="round" id="lg"></div>
        </div>
        <div class="color">
            <h4>repeated-linear-gradinet</h4>
            <div class="round" id="rlg"></div>
        </div>
        <div class="color">
            <h4>radial-gradient</h4>
            <div class="round" id="rg"></div>
        </div>
        <div class="color">
            <h4>repeated-radial-gradient</h4>
            <div class="round" id="rrg"></div>
        </div>

    </div>
</body>
</html>
